<!doctype html>
<html lang="it" dir="ltr">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>Privacy Policy - RememberTo</title>
		<link
			rel="stylesheet"
			href="styles.css" />
		<script
			src="i18n.js"
			defer></script>
	</head>
	<body data-page="privacy">
		<main class="container">
			<header class="site-header">
				<div class="header-copy">
					<h1 id="page-title">Privacy Policy - RememberTo</h1>
				</div>
				<img
					class="logo"
					src="logo.png"
					alt="RememberTo Logo" />
			</header>

			<div class="language-bar">
				<label
					id="language-label"
					for="language-select"
					>Lingua</label
				>
				<select id="language-select"></select>
			</div>

			<section id="page-content"></section>
			<noscript>
				<p>Abilita JavaScript per visualizzare le versioni multilingua.</p>
			</noscript>
			<footer id="page-footer"></footer>
		</main>
	</body>
</html>
